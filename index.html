<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>THÔNG TIN KHÁCH SIM AI</title>

  <meta name="theme-color" content="#0b1630" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SIM AI" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b1630;
      font-family: Arial, Helvetica, sans-serif;
    }

    #appFrame {
      width: 100%;
      height: 100vh;
      border: none;
      display: block;
      background: #0b1630;
    }

    .loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: linear-gradient(180deg, #081225, #0d1b38);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      transition: opacity .35s ease, visibility .35s ease;
    }

    .loading.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loading-logo {
      width: 84px;
      height: 84px;
      border-radius: 24px;
      background: radial-gradient(circle at 30% 30%, #2da6ff, #102d67 60%, #091a3b 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
      margin-bottom: 18px;
    }

    .loading-title {
      font-size: 24px;
      font-weight: 800;
      color: #ff8a00;
      text-align: center;
      padding: 0 16px;
    }

    .loading-sub {
      margin-top: 8px;
      color: #c9d6ff;
      font-size: 14px;
      text-align: center;
      padding: 0 16px;
    }

    .spinner {
      margin-top: 20px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,.15);
      border-top-color: #ff8a00;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <iframe
    id="appFrame"
    src="https://script.google.com/macros/s/AKfycbzP44tbLvlfnngtCYNg_13C9DmXuM98oqGDb-SnRb6mIfwOzTIzhVxOon1TE-0RePHsFg/exec"
    allow="clipboard-read; clipboard-write"
    loading="eager"
  ></iframe>

  <div class="loading" id="loading">
    <div class="loading-logo">📱</div>
    <div class="loading-title">THÔNG TIN KHÁCH SIM AI</div>
    <div class="loading-sub">Đang mở ứng dụng...</div>
    <div class="spinner"></div>
  </div>

  <script>
    const frame = document.getElementById("appFrame");
    const loading = document.getElementById("loading");

    function hideLoading() {
      loading.classList.add("hide");
    }

    frame.addEventListener("load", () => {
      setTimeout(hideLoading, 1200);
    });

    setTimeout(hideLoading, 5000);
  </script>
</body>
</html>
