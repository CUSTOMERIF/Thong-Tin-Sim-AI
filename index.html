<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>THÔNG TIN KHÁCH SIM AI</title>

  <style>
    :root{
      --bg-1:#050d1a;
      --bg-2:#0a1730;
      --bg-3:#10254b;
      --bg-4:#18386c;

      --glass:rgba(10,22,46,.72);
      --glass-2:rgba(14,28,54,.84);
      --glass-border:rgba(255,255,255,.10);

      --text:#eef4ff;
      --text-soft:#b8c8e6;
      --text-dim:#90a6c9;

      --accent:#e98a2c;
      --accent-2:#ffd38a;
      --accent-3:#fff1c8;

      --shadow-xl:0 28px 60px rgba(0,0,0,.38);
      --shadow-lg:0 18px 45px rgba(0,0,0,.34);
      --shadow-md:0 10px 26px rgba(0,0,0,.28);

      --radius-xl:32px;
      --radius-lg:26px;
      --radius-md:20px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg-2);
      color:var(--text);
    }

    body{
      position:relative;
    }

    /* APP */
    #appFrame{
      width:100%;
      height:100vh;
      border:none;
      display:block;
      background:var(--bg-2);
      opacity:.02;
      transform:scale(1.012);
      transition:opacity .65s ease, transform .65s ease, filter .65s ease;
      filter:saturate(.96);
    }

    body.app-ready #appFrame{
      opacity:1;
      transform:scale(1);
      filter:saturate(1);
    }

    /* ===== GLOBAL FX ===== */
    .noise,
    .vignette{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .noise{
      opacity:.07;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.08) 0 1px, transparent 1px),
        radial-gradient(circle at 80% 40%, rgba(255,255,255,.06) 0 1px, transparent 1px),
        radial-gradient(circle at 50% 80%, rgba(255,255,255,.05) 0 1px, transparent 1px);
      background-size:140px 140px, 170px 170px, 210px 210px;
      mix-blend-mode:soft-light;
    }

    .vignette{
      background:radial-gradient(circle at center, rgba(0,0,0,0) 42%, rgba(0,0,0,.22) 100%);
    }

    /* ================= INTRO LOGO ================= */
    .intro-logo{
      position:fixed;
      inset:0;
      z-index:10000;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 36%, rgba(255,220,170,.08) 0%, rgba(255,220,170,0) 24%),
        radial-gradient(circle at 50% 72%, rgba(233,138,44,.10) 0%, rgba(233,138,44,0) 34%),
        linear-gradient(180deg, #050d1a 0%, #0a1730 56%, #112852 100%);
      transition:opacity .55s ease, visibility .55s ease, transform .55s ease;
    }

    .intro-logo.hide{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
      transform:scale(1.02);
    }

    .intro-orb{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%, -50%);
      width:min(76vw, 540px);
      height:min(76vw, 540px);
      border-radius:50%;
      background:
        radial-gradient(circle, rgba(255,214,150,.18) 0%, rgba(233,138,44,.10) 34%, rgba(233,138,44,0) 72%);
      filter:blur(12px);
      animation:introOrb 4.2s ease-in-out infinite;
    }

    .intro-rings{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
    }

    .intro-rings::before,
    .intro-rings::after{
      content:"";
      position:absolute;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 0 40px rgba(233,138,44,.08);
    }

    .intro-rings::before{
      width:min(72vw, 420px);
      height:min(72vw, 420px);
      animation:introRingPulse 3.8s ease-in-out infinite;
    }

    .intro-rings::after{
      width:min(80vw, 500px);
      height:min(80vw, 500px);
      border-color:rgba(255,255,255,.06);
      animation:introRingPulse 5.4s ease-in-out infinite reverse;
    }

    .intro-card{
      position:relative;
      width:min(66vw, 220px);
      aspect-ratio:1/1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:12px;
      border-radius:30px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.985), rgba(245,248,252,.965));
      box-shadow:
        0 26px 60px rgba(0,0,0,.38),
        0 0 0 1px rgba(255,255,255,.45) inset,
        0 0 40px rgba(233,138,44,.10);
      animation:introPop 1s cubic-bezier(.2,.8,.2,1) both;
      z-index:2;
      overflow:hidden;
    }

    .intro-card::before{
      content:"";
      position:absolute;
      inset:-18px;
      border-radius:38px;
      background:
        radial-gradient(circle, rgba(233,138,44,.18) 0%, rgba(233,138,44,.08) 35%, rgba(233,138,44,0) 72%);
      filter:blur(16px);
      z-index:-1;
      animation:introGlow 2.6s ease-in-out infinite;
    }

    .intro-card::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.40), rgba(255,255,255,0) 42%);
      pointer-events:none;
    }

    .intro-logo-img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      border-radius:18px;
      animation:introFloat 2.2s ease-in-out infinite;
      filter:drop-shadow(0 8px 16px rgba(0,0,0,.10));
    }

    @keyframes introPop{
      0%{
        transform:scale(.84);
        opacity:0;
      }
      55%{
        transform:scale(1.04);
        opacity:1;
      }
      100%{
        transform:scale(1);
        opacity:1;
      }
    }

    @keyframes introFloat{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-4px); }
    }

    @keyframes introGlow{
      0%,100%{
        transform:scale(.96);
        opacity:.72;
      }
      50%{
        transform:scale(1.06);
        opacity:1;
      }
    }

    @keyframes introOrb{
      0%,100%{
        transform:translate(-50%, -50%) scale(.96);
        opacity:.8;
      }
      50%{
        transform:translate(-50%, -50%) scale(1.06);
        opacity:1;
      }
    }

    @keyframes introRingPulse{
      0%,100%{
        transform:scale(.98);
        opacity:.52;
      }
      50%{
        transform:scale(1.03);
        opacity:.9;
      }
    }

    /* ================= LOADING ================= */
    .loading{
      position:fixed;
      inset:0;
      z-index:9999;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 24%, rgba(233,138,44,.08), transparent 28%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 56%, var(--bg-3) 100%);
      transition:opacity .45s ease, visibility .45s ease, transform .45s ease;
    }

    .loading.hide{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
      transform:scale(1.01);
    }

    .bg-grid{
      position:absolute;
      inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size:34px 34px;
      mask-image:linear-gradient(to bottom, rgba(255,255,255,.18), rgba(255,255,255,.02) 50%, transparent 85%);
      opacity:.25;
      animation:gridMove 14s linear infinite;
      pointer-events:none;
    }

    @keyframes gridMove{
      from{ transform:translateY(0); }
      to{ transform:translateY(34px); }
    }

    .floor-glow{
      position:absolute;
      left:50%;
      bottom:8%;
      width:min(92vw, 920px);
      height:220px;
      transform:translateX(-50%);
      background:
        radial-gradient(ellipse at center, rgba(233,138,44,.20) 0%, rgba(233,138,44,.08) 34%, rgba(233,138,44,0) 70%);
      filter:blur(10px);
      pointer-events:none;
    }

    .loading-card{
      position:relative;
      z-index:2;
      width:min(92vw, 720px);
      padding:22px 20px 18px;
      border-radius:28px;
      background:
        linear-gradient(180deg, rgba(14,29,57,.78), rgba(10,20,39,.72));
      border:1px solid var(--glass-border);
      box-shadow:
        var(--shadow-lg),
        0 0 0 1px rgba(255,255,255,.02) inset;
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      text-align:center;
      overflow:hidden;
    }

    .loading-card::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.05), rgba(255,255,255,0) 40%);
      pointer-events:none;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      color:#eaf2ff;
      font-size:13px;
      letter-spacing:.2px;
      margin-bottom:18px;
      position:relative;
      z-index:2;
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--accent);
      box-shadow:0 0 0 0 rgba(233,138,44,.55);
      animation:pulseDot 1.5s infinite;
      flex:0 0 auto;
    }

    @keyframes pulseDot{
      0%{ box-shadow:0 0 0 0 rgba(233,138,44,.55); }
      70%{ box-shadow:0 0 0 12px rgba(233,138,44,0); }
      100%{ box-shadow:0 0 0 0 rgba(233,138,44,0); }
    }

    .logo-stage{
      position:relative;
      width:min(72vw, 320px);
      height:min(72vw, 320px);
      margin:0 auto 14px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .sun-flare{
      position:absolute;
      width:290px;
      height:290px;
      border-radius:50%;
      background:
        radial-gradient(circle, rgba(255,211,138,.34) 0%, rgba(233,138,44,.14) 34%, rgba(233,138,44,0) 72%);
      filter:blur(16px);
      animation:flarePulse 3.6s ease-in-out infinite;
    }

    .sun-rays{
      position:absolute;
      width:260px;
      height:260px;
      border-radius:50%;
      background:
        repeating-conic-gradient(
          from 0deg,
          rgba(255,211,138,.15) 0deg 7deg,
          rgba(255,211,138,0) 7deg 20deg
        );
      filter:blur(2px);
      animation:spinRays 14s linear infinite;
      opacity:.7;
    }

    .sun-ring,
    .sun-ring2{
      position:absolute;
      border-radius:50%;
      border:1px solid rgba(255,211,138,.32);
    }

    .sun-ring{
      width:220px;
      height:220px;
      animation:ringPulse 3s ease-in-out infinite;
    }

    .sun-ring2{
      width:255px;
      height:255px;
      border-color:rgba(255,211,138,.18);
      animation:ringPulse 4.5s ease-in-out infinite reverse;
    }

    .sun-core{
      position:absolute;
      width:150px;
      height:150px;
      border-radius:50%;
      background:
        radial-gradient(circle at 50% 40%, #fff7d8 0%, #ffd38a 38%, #f2a145 62%, rgba(242,161,69,.16) 100%);
      filter:blur(.3px);
      opacity:.88;
      animation:sunBreath 3.2s ease-in-out infinite;
    }

    .logo-box{
      position:relative;
      z-index:2;
      width:132px;
      height:132px;
      border-radius:24px;
      padding:10px;
      background:rgba(255,255,255,.97);
      box-shadow:
        0 18px 34px rgba(0,0,0,.28),
        0 0 0 1px rgba(255,255,255,.45) inset;
      display:flex;
      align-items:center;
      justify-content:center;
      animation:logoFloat 2.8s ease-in-out infinite;
    }

    .logo-box img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      border-radius:16px;
    }

    .horizon{
      position:absolute;
      left:50%;
      bottom:38px;
      transform:translateX(-50%);
      width:240px;
      height:68px;
      border-radius:50%;
      background:
        radial-gradient(ellipse at center, rgba(233,138,44,.18), rgba(233,138,44,.06) 48%, rgba(233,138,44,0) 74%);
      filter:blur(6px);
      z-index:0;
    }

    .horizon-line{
      position:absolute;
      left:50%;
      bottom:62px;
      transform:translateX(-50%);
      width:210px;
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.35), transparent);
      opacity:.55;
    }

    @keyframes sunBreath{
      0%,100%{ transform:scale(.98); opacity:.85; }
      50%{ transform:scale(1.06); opacity:1; }
    }

    @keyframes ringPulse{
      0%,100%{ transform:scale(.98); opacity:.55; }
      50%{ transform:scale(1.03); opacity:.95; }
    }

    @keyframes flarePulse{
      0%,100%{ transform:scale(.95); opacity:.72; }
      50%{ transform:scale(1.08); opacity:1; }
    }

    @keyframes spinRays{
      from{ transform:rotate(0deg); }
      to{ transform:rotate(360deg); }
    }

    @keyframes logoFloat{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-6px); }
    }

    .title{
      margin:8px 0 8px;
      font-size:clamp(20px, 2.6vw, 32px);
      line-height:1.15;
      font-weight:800;
      letter-spacing:.4px;
      color:#f6f9ff;
      position:relative;
      z-index:2;
    }

    .sub{
      max-width:560px;
      margin:0 auto;
      color:var(--text-soft);
      font-size:14px;
      line-height:1.55;
      position:relative;
      z-index:2;
    }

    .progress-wrap{
      margin-top:18px;
      position:relative;
      z-index:2;
    }

    .progress-track{
      position:relative;
      width:min(86%, 500px);
      height:12px;
      margin:0 auto;
      border-radius:999px;
      overflow:hidden;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:inset 0 2px 8px rgba(0,0,0,.18);
    }

    .progress-bar{
      width:0%;
      height:100%;
      border-radius:999px;
      background:
        linear-gradient(90deg, #f2a145 0%, #ffd38a 48%, #fff0c8 100%);
      box-shadow:
        0 0 16px rgba(233,138,44,.38),
        inset 0 0 8px rgba(255,255,255,.32);
      transition:width .25s ease;
      position:relative;
      z-index:1;
    }

    .progress-shine{
      position:absolute;
      inset:0;
      background:
        linear-gradient(120deg, transparent 0%, rgba(255,255,255,.20) 40%, transparent 65%);
      transform:translateX(-120%);
      animation:shineMove 1.8s linear infinite;
      z-index:2;
      pointer-events:none;
    }

    @keyframes shineMove{
      from{ transform:translateX(-120%); }
      to{ transform:translateX(120%); }
    }

    .caption{
      margin-top:10px;
      color:#d9e7ff;
      font-size:13px;
      letter-spacing:.2px;
      min-height:18px;
    }

    .dots{
      display:flex;
      justify-content:center;
      gap:8px;
      margin-top:16px;
      position:relative;
      z-index:2;
    }

    .dots span{
      width:8px;
      height:8px;
      border-radius:50%;
      background:rgba(255,255,255,.34);
      animation:dotsBlink 1.2s infinite ease-in-out;
    }

    .dots span:nth-child(2){ animation-delay:.15s; }
    .dots span:nth-child(3){ animation-delay:.3s; }

    @keyframes dotsBlink{
      0%,80%,100%{
        transform:scale(.8);
        opacity:.45;
      }
      40%{
        transform:scale(1.15);
        opacity:1;
      }
    }

    @media (max-width:480px){
      .intro-card{
        width:min(70vw, 205px);
        border-radius:24px;
        padding:10px;
      }

      .intro-logo-img{
        border-radius:16px;
      }

      .loading-card{
        width:min(94vw, 680px);
        padding:18px 14px 16px;
        border-radius:24px;
      }

      .logo-stage{
        width:min(78vw, 280px);
        height:min(78vw, 280px);
      }

      .sun-flare{ width:250px; height:250px; }
      .sun-rays{ width:225px; height:225px; }
      .sun-ring{ width:190px; height:190px; }
      .sun-ring2{ width:220px; height:220px; }
      .sun-core{ width:128px; height:128px; }

      .logo-box{
        width:116px;
        height:116px;
        border-radius:22px;
      }

      .title{
        font-size:22px;
      }

      .sub{
        font-size:13px;
      }

      .progress-track{
        width:92%;
      }
    }
  </style>
</head>
<body>
  <iframe
    id="appFrame"
    src="https://script.google.com/macros/s/AKfycbzP44tbLvlfnngtCYNg_13C9DmXuM98oqGDb-SnRb6mIfwOzTIzhVxOon1TE-0RePHsFg/exec"
    allow="clipboard-read; clipboard-write"
    loading="eager"
  ></iframe>

  <!-- INTRO LOGO -->
  <div class="intro-logo" id="introLogo">
    <div class="noise"></div>
    <div class="vignette"></div>
    <div class="intro-orb"></div>
    <div class="intro-rings"></div>

    <div class="intro-card">
      <img src="logo-loading.png" alt="SIM AI Logo" class="intro-logo-img">
    </div>
  </div>

  <!-- LOADING -->
  <div class="loading" id="loading">
    <div class="noise"></div>
    <div class="vignette"></div>
    <div class="bg-grid"></div>
    <div class="floor-glow"></div>

    <div class="loading-card">
      <div class="badge">
        <span class="dot"></span>
        <span>SIM AI • Đang khởi động hệ thống</span>
      </div>

      <div class="logo-stage">
        <div class="sun-flare"></div>
        <div class="sun-rays"></div>
        <div class="sun-ring2"></div>
        <div class="sun-ring"></div>
        <div class="sun-core"></div>

        <div class="logo-box">
          <img src="logo-loading.png" alt="SIM AI Logo">
        </div>

        <div class="horizon-line"></div>
        <div class="horizon"></div>
      </div>

      <h1 class="title">THÔNG TIN KHÁCH SIM AI</h1>
      <div class="sub">
        Đang mở ứng dụng và tải giao diện tối ưu cho thiết bị của bạn...
      </div>

      <div class="progress-wrap">
        <div class="progress-track">
          <div class="progress-bar" id="progressBar"></div>
          <div class="progress-shine"></div>
        </div>
        <div class="caption" id="loadingCaption">Vui lòng chờ trong giây lát</div>
      </div>

      <div class="dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>

  <script>
    const frame = document.getElementById("appFrame");
    const introLogo = document.getElementById("introLogo");
    const loading = document.getElementById("loading");
    const progressBar = document.getElementById("progressBar");
    const loadingCaption = document.getElementById("loadingCaption");

    let hasHidden = false;
    let fakeProgress = 12;
    let progressTimer;
    let loadingStarted = false;

    const loadingTexts = [
      "Vui lòng chờ trong giây lát",
      "Đang kết nối dữ liệu khách hàng...",
      "Đang chuẩn bị giao diện SIM AI...",
      "Sắp hoàn tất..."
    ];

    function updateProgressText(value){
      if (value < 30){
        loadingCaption.textContent = loadingTexts[0];
      } else if (value < 55){
        loadingCaption.textContent = loadingTexts[1];
      } else if (value < 80){
        loadingCaption.textContent = loadingTexts[2];
      } else {
        loadingCaption.textContent = loadingTexts[3];
      }
    }

    function startFakeProgress(){
      if (loadingStarted) return;
      loadingStarted = true;

      progressBar.style.width = fakeProgress + "%";
      updateProgressText(fakeProgress);

      progressTimer = setInterval(() => {
        if (hasHidden) return;

        if (fakeProgress < 35){
          fakeProgress += Math.random() * 6;
        } else if (fakeProgress < 60){
          fakeProgress += Math.random() * 4;
        } else if (fakeProgress < 82){
          fakeProgress += Math.random() * 2.4;
        } else if (fakeProgress < 92){
          fakeProgress += Math.random() * 1.1;
        }

        if (fakeProgress > 92) fakeProgress = 92;

        progressBar.style.width = fakeProgress + "%";
        updateProgressText(fakeProgress);
      }, 220);
    }

    function hideLoading(){
      if (hasHidden) return;
      hasHidden = true;

      clearInterval(progressTimer);
      progressBar.style.width = "100%";
      loadingCaption.textContent = "Hoàn tất";

      document.body.classList.add("app-
